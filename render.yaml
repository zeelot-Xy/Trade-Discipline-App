services:
  - type: web
    name: tradecadet-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: tradecadet-uploads
      mountPath: /var/data/tradecadet-uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: UPLOADS_DIR
        value: /var/data/tradecadet-uploads
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: API_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PRO_PLAN_CODE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
